<!DOCTYPE html>
<html>
<head>
    <title>Parents vs Studies Meme</title>

    <style>

        body{
            background-color: lightblue;
            text-align: center;
        }

        .box{
            width: 500px;
            margin: auto;
            background-color: rgb(236, 209, 209);
            border: 2px solid black;
            padding: 15px;
        }

        img{
            width:50%;
            display:block;
            margin:auto;
}

        .message{
            display: none;
            background-color: rgb(189, 129, 27);
            border: 1px solid black;
            padding: 10px;
            margin-top: 10px;
            font-size: 20px;
        }

        img:hover + .message{
            display: block;
        }

    </style>

</head>

<body>

    <h1>Parents During Exams</h1>

    <div class="box">

        <h2>Mom: "Go and study for just 10 minutes."</h2>

        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=700" alt="Dog">

        <div class="message">

            10 minutes later...<br><br>

            Mom: "You've been studying all day. Take some rest."<br><br>

            5 minutes later...<br><br>

            Mom: "Why are you wasting time? Go and study!"

        </div>

        <h2>Me: "What exactly do you want?"</h2>

    </div>

</body>
</html>
