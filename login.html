<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#beedf0,#5495f1);
    min-height:100vh;
}

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 35px;
    background:#1E3A8A;
    box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

nav h2{
    color:white;
}

ul{
    display:flex;
    gap:30px;
    list-style:none;
}

ul a{
    text-decoration:none;
    color:white;
    font-size:18px;
}

ul a:hover{
    color:#FFD700;
}

.notification{
    position:relative;
    font-size:28px;
    color:white;
}

.badge{
    position:absolute;
    top:-8px;
    right:-10px;
    width:22px;
    height:22px;
    background:red;
    color:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
    font-weight:bold;
}

.form{
    width:340px;
    background:white;
    padding:25px;
    border-radius:15px;
    margin:130px auto;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.form h2{
    color:#1E3A8A;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

.password{
    position:relative;
}

.icon{
    position:absolute;
    right:12px;
    top:22px;
    color:#2563eb;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
}

.icon .hint{
    position:absolute;
    right:25px;
    top:-5px;
    background:#333;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    white-space:nowrap;
    opacity:0;
    visibility:hidden;
    transition:.3s;
    pointer-events:none;
}

.icon:hover .hint,
.icon:focus-visible .hint{
    opacity:1;
    visibility:visible;
}

.cross{
    position:absolute;
    top:10px;
    right:10px;
    width:30px;
    height:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    cursor:pointer;
    color:gray;
}


.submit{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#1E3A8A;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.submit:hover{
    background:#2563eb;
}

@media(max-width:768px){

    body{
        background:lightgreen;
    }

    .form{
        width:90%;
    }

    ul{
        gap:15px;
    }
}

@media(max-width:480px){
    body{
        background:lightpink;
    }

    nav{
        flex-direction:column;
        height:auto;
        padding:15px;
        gap:10px;
    }

    ul{
        flex-direction:column;
        align-items:center;
        gap:10px;
    }

    .form{
        width:92%;
        margin-top:210px;
    }
}
</style>

</head>
<body>
<nav>
    <h2>CodeVerse</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Courses</a></li>
    </ul>

    <div class="notification">
        <i class="fa-solid fa-bell"></i>
        <span class="badge">5</span>
    </div>
</nav>

<div class="form">
    <div class="cross">
        <i class="fa-solid fa-xmark"></i>
    </div>
    <h2>Login</h2>
    <input
        type="email"
        placeholder="Enter Email"
        required>
    <div class="password">
        <input type="password" placeholder="Enter Password" minlength="8" required>
        <span class="icon" tabindex="0">
            <i class="fa-solid fa-heart"></i>
            <span class="hint">
                Minimum 8 characters required
            </span>
        </span>
    </div>
    <button class="submit">
        Submit
    </button>
</div>
</body>
</html>
